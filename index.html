<html lang="en">

    <meta charset="UTF-8">

    <style>
        body {

```
    header {
        padding: 40px;
        font-size: 2em;
        font-weight: bold;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        padding: 20px;
    }

    .card {
        background: white;
        color: black;
        padding: 20px;
        border-radius: 12px;
        width: 250px;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    button {
        padding: 10px 20px;
        border: none;
        background: #667eea;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s;
    }

    button:hover {
        background: #5a67d8;
    }

    footer {
        margin-top: 30px;
        padding: 15px;
        font-size: 0.9em;
        opacity: 0.8;
    }
</style>
```

</head>
